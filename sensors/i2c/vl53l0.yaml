################################################################################
# VL53L0X Time Of Flight Distance Sensor
################################################################################
# Usage:
#   Add the following code to package section in the device file changing the 
#   I2C Address to the appropriate one.
# ------------------------------------------------------------------------------
# packages:
#   sps30: !include
#     file: sensors/i2c/vl53l0.yaml
#     vars: 
#       i2c_address: 0x41
# ------------------------------------------------------------------------------
# Author: Pascal Parent
# Company: Home Automator (ZA)
# Web: https://www.youtube.com/@homeautomatorza
# Version: 1.0.0
# Licence: CC0 1.0 https://creativecommons.org/publicdomain/zero/1.0/
# References: https://www.esphome.io/components/sensor/sps30/
# ------------------------------------------------------------------------------
# WARNING:
# This code carries a "It works on my setup" disclaimer!
# Meaning that it works on my setup but it may not work on yours.
################################################################################
sensor:
  - platform: vl53l0x
    id: ${device_internal_name}_tof_distance
    name: Time Of Flight Distance
    address: ${i2c_address}
    timeout: 200us
    update_interval: 500ms
    unit_of_measurement: "m"
    device_class: distance
    state_class: measurement
    icon: mdi:arrow-expand-vertical