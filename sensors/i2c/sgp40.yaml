################################################################################
# SGP40 VOC Sensor
################################################################################
# Usage:
#   Add the following code to package section in the device file changing the
#   humidity and temperature id to the sensor used.
# ------------------------------------------------------------------------------
# packages:
#   sgp40: !include
#     file: sensors/i2c/sgp40.yaml
#     vars:
#       humidity: ${device_internal_name}_source_humidity
#       temperature: ${device_internal_name}_source_temperature
# ------------------------------------------------------------------------------
# This package exposes:
#   - sensor entities
# ------------------------------------------------------------------------------
# Author: Pascal Parent
# Company: Home Automator (ZA)
# Web: https://www.youtube.com/@homeautomatorza
# Version: 1.1.0
# Licence: CC0 1.0 https://creativecommons.org/publicdomain/zero/1.0/
# References: https://esphome.io/components/sensor/index.html
# References: https://esphome.io/components/sensor/sgp4x.html
# ------------------------------------------------------------------------------
# WARNING:
# This code carries a "It works on my setup" disclaimer!
# Meaning that it works on my setup but it may not work on yours.
################################################################################
sensor:
  - platform: sgp4x
    voc:
      id: ${device_internal_name}_voc_index
      name: "VOC Index"
      state_class: measurement
    compensation:
      humidity_source: ${humidity}
      temperature_source: ${temperature}
    update_interval: ${device_sampling_time}
