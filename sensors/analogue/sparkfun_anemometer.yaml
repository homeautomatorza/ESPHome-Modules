################################################################################
# Sparkfun Anemometer
################################################################################
# Usage:
#   Add the following code to package section in the device file changing the 
#   I2C Address to the appropriate one.
# -----------------------------------------------------------------------------
# packages:
#  sf_anemometer: !include 
#    file: sensors/analogue/sparkfun_anemometer.yaml
#.   vars:
#      pin: GPIO14
# ------------------------------------------------------------------------------
# Author: Pascal Parent
# Company: Home Automator (ZA)
# Web: https://www.youtube.com/@homeautomatorza
# Version: 1.1.0
# Licence: CC0 1.0 https://creativecommons.org/publicdomain/zero/1.0/
# References: https://esphome.io/components/sensor/ccs811.html 
# ------------------------------------------------------------------------------
# Notes:
# ------------------------------------------------------------------------------
# WARNING:
# This code carries a "It works on my setup" disclaimer!
# Meaning that it works on my setup but it may not work on yours.
# Use at your own risk.
################################################################################
sensor:
  # Wind Speed
  - platform: pulse_counter
    name: Wind Speed (KPH)
    id: ${device_internal_name}_wind_speed_kph
    icon: mdi:weather-windy
    pin: 
      number: ${pin}
      mode: INPUT_PULLUP
    unit_of_measurement: km/h
    accuracy_decimals: 1
    update_interval: 5s #${device_sampling_time}
    filters:
      - multiply: 0.04
    device_class: wind_speed

  # Wind Speed in Knots (Template Helper)      
  - platform: template
    name: Wind Speed (Knots)
    id: ${device_internal_name}_wind_meter_knot
    icon: mdi:weather-windy
    unit_of_measurement: knots
    update_interval: 5s #${device_sampling_time}
    lambda: |-
      return id(${device_internal_name}_wind_speed_kph).state * 0.539957;
    device_class: wind_speed

  # Average Speed (For Beaufort Scale)
  - platform: template
    name: 'Wind Speed Average'
    icon: 'mdi:weather-windy'
    id: ${device_internal_name}_wind_meter_avg
    lambda: return id(${device_internal_name}_wind_speed_kph).state;
    unit_of_measurement: 'km/h'
    update_interval: ${device_sampling_time}
    disabled_by_default: true
    filters:
      - throttle_average: 60s
    on_value:
      lambda: |-
        float speed = x;
        auto *text_sensor = id(${device_internal_name}_wind_scale);      

        // Beaufort Scale Logic
        if (speed < 1) {
          text_sensor->publish_state("Calm");
        } else if (speed < 6) {
          text_sensor->publish_state("Light Air");
        } else if (speed < 12) {
          text_sensor->publish_state("Light Breeze");
        } else if (speed < 20) {
          text_sensor->publish_state("Gentle Breeze");
        } else if (speed < 29) {
          text_sensor->publish_state("Moderate Breeze");
        } else if (speed < 39) {
          text_sensor->publish_state("Fresh Breeze");
        } else if (speed < 50) {
          text_sensor->publish_state("Strong Breeze");
        } else if (speed < 62) {
          text_sensor->publish_state("Near Gale");
        } else if (speed < 75) {
          text_sensor->publish_state("Gale");
        } else if (speed < 89) {
          text_sensor->publish_state("Severe Gale");
        } else if (speed < 103) {
          text_sensor->publish_state("Storm");
        } else if (speed < 118) {
          text_sensor->publish_state("Violent Storm");
        } else {
          text_sensor->publish_state("Hurricane Force");
        }

text_sensor:
  # Beaufort Output
  - platform: template
    name: Beaufort Wind Scale
    icon: mdi:tailwind
    id: ${device_internal_name}_wind_scale
    update_interval: never
