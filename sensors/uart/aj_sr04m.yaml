#${uart_port}

# Distance from sensor
sensor:
  - platform: jsn_sr04t
    id: ${device_internal_name}_aj_sr04m_distance
    name: Distance
    icon: mdi:map-marker-distance
    uart_id: ${uart_port}
    model: aj_sr04m
    accuracy_decimals: 1
    #unit_of_measurement: mm
    device_class: distance
    state_class: measurement
    update_interval: ${device_sampling_time}

