# Latest Updates (2026/04/16)

Tested with ESPHome 2026.4

I ran [Google Jules](https://jules.google.com/) Coding AI against this repo, it found a few issues which I promptly fixed but it seems that it's information is outdated by a few month, 6 or more in my opinion, so I would definitively not use it for generating ESPHome files.

Important: Please note that this code is not tested yet, further changes and full testing are expected in the next few days!

In short, the WiFi and a couple of other modules are being rewriten to cater for deployments outside your home, this means you will be able to prepare a ESP32 package and connect to a WiFi AP using improv or the captive portal.
I ask for some patiance for me to write the neccesary code and test it.

Another update is coming soon!

