################################################################################
# WiFi Fixed IP Component for ESP32
################################################################################
# Usage:
#   Add the following code to package section in the device file
# ------------------------------------------------------------------------------
# packages:
#   wifi: !include common/network/wifi_fixedip.yaml
# ------------------------------------------------------------------------------
# Author: Pascal Parent
# Company: Home Automator (ZA)
# Web: https://www.youtube.com/@homeautomatorza
# Version: 1.4.0
# Licence: CCO 1.0 https://creativecommons.org/publicdomain/zero/1.0/
# Reference: https://www.esphome.io/components/wifi
# ------------------------------------------------------------------------------
# Notes: 
#       - Requires the following substitution in the device file:
#           - device_ip_address
#           - device_internal_name
#       - Requires the folowing secrets:
#           - wifi_ssid
#           - subnet_address
#           - gateway_address
#           - dns_address (Optional)
# ------------------------------------------------------------------------------
# WARNING:
# This code carries a "It works on my setup" disclaimer!
# Meaning that it works on my setup but it may not work on yours.
################################################################################
wifi:
  id: ${device_internal_name}_wifi
  output_power: 8.5dB
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  min_auth_mode: WPA2 # Requires ESPHome 2025.11 +

  manual_ip:
    static_ip: ${device_ip_address}
    gateway: !secret gateway_address
    subnet: !secret subnet_address
  
  ap:
    ssid: ${device_wifi_name}

  fast_connect: true

  # Prevents wifi ap roaming once connected - Requires ESPHome 2026.1 +
  post_connect_roaming: false 