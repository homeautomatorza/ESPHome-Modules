################################################################################
# AHT20 or 30 Temperature+Humidity Sensor
################################################################################
# Usage:
#   Add the following code to package section in the device file changing the 
#   I2C Address to the appropriate one.
# -----------------------------------------------------------------------------
# packages:
#  aht20: !include 
#    file: sensors/i2c/aht2x-3x.yaml
#    vars:
#      i2c_address: 0x38
# ------------------------------------------------------------------------------
# Author: Pascal Parent
# Company: Home Automator (ZA)
# Web: https://www.youtube.com/@homeautomatorza
# Version: 1.1.0
# Licence: CCO 1.0 https://creativecommons.org/publicdomain/zero/1.0/
# Reference: https://esphome.io/components/sensor/aht10/ 
# ------------------------------------------------------------------------------
# WARNING:
# This code carries a "It works on my setup" disclaimer!
# Meaning that it works on my setup but it may not work on yours.
################################################################################
sensor:
  - platform: aht10
    variant: AHT20
    temperature:
      id: ${device_internal_name}_aht20_temperature_c
      name: AHT20 Temperature (C)
      icon: mdi:temperature-celsius
      unit_of_measurement: '°C'
      device_class: temperature
      state_class: "measurement"
    humidity:
      id: ${device_internal_name}_aht20_humidity
      name: AHT20 Humidity
      icon: mdi:water-percent
      unit_of_measurement: '%'
      device_class: humidity
      state_class: "measurement"
    update_interval: ${device_sampling_time}

  # Temparature Fahrenheit
  - platform: template
    id: ${device_internal_name}_aht20_temperature_f
    name: AHT20 Temperature (F)
    icon: mdi:temperature-fahrenheit
    unit_of_measurement: '°F'
    lambda: return id(${device_internal_name}_aht20_temperature_c).state * 9/5+32;
    device_class: temperature
    state_class: "measurement"
    update_interval: ${device_sampling_time}
    disabled_by_default: true

  # Dew Point
  - platform: template
    name: "AHT20 Dew Point"
    id: ${device_internal_name}_aht20_dew_point
    lambda: |-
      return (243.5*(log(id(${device_internal_name}_aht20_humidity).state/100)+((17.67*id(${device_internal_name}_aht20_temperature_c).state)/
      (243.5+id(${device_internal_name}_aht20_temperature_c).state)))/(17.67-log(id(${device_internal_name}_aht20_humidity).state/100)-
      ((17.67*id(${device_internal_name}_aht20_temperature_c).state)/(243.5+id(${device_internal_name}_aht20_temperature_c).state))));
    unit_of_measurement: °C
    state_class: "measurement"
    icon: 'mdi:thermometer-alert'
    update_interval: ${device_sampling_time}
    disabled_by_default: true