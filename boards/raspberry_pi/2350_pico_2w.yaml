################################################################################
# Raspberry Pi Pico 2 W
################################################################################
# Usage:
#   Add the following code to package section in the device file
# ------------------------------------------------------------------------------
# packages:
#   board: !include boards/raspberry_pi/2350_pico_2w.yaml
# ------------------------------------------------------------------------------
# This package exposes:
#   - ESPHome project-level options
#   - RP2040 board/platform configuration
#   - I2C bus configuration
#   - external component sources
#   - UART bus configuration
#   - SPI bus configuration
#   - sensor entities
# ------------------------------------------------------------------------------
# Author: Pascal Parent
# Company: Home Automator (ZA)
# Web: https://www.youtube.com/@homeautomatorza
# Version: 0.1.0 Beta
# Licence: CC0 1.0 https://creativecommons.org/publicdomain/zero/1.0/
# Reference: https://esphome.io/components/esphome.html
# Reference: https://esphome.io/components/rp2040.html
# Reference: https://esphome.io/components/i2c.html
# Reference: https://esphome.io/components/external_components.html
# Reference: https://esphome.io/components/uart.html
# Reference: https://esphome.io/components/spi.html
# Reference: https://esphome.io/components/sensor/index.html
# Reference: https://esphome.io/components/sensor/internal_temperature.html
# ------------------------------------------------------------------------------
# Notes:
#     - Unfinished
#     - Requires more testing
#     - Yellow LED Credits:
#       https://community.home-assistant.io/t/rpi-pico-w-onboard-temperature-sensor-and-onboard-led/564904/3
# ------------------------------------------------------------------------------
# WARNING:
# This code carries a "It works on my setup" disclaimer!
# Meaning that it works on my setup but it may not work on yours.
# Use at your own risk.
################################################################################
esphome:

rp2040:
  board: rpipico2w
  framework:
    platform_version: https://github.com/maxgerhardt/platform-raspberrypi.git#develop
    version: dev

# I2C
i2c:
  id: ${device_internal_name}_i2c_bus0
  sda: GPIO20
  scl: GPIO21
  scan: true

# External Components
external_components:
  source: github://pr#5466
  components: [ spi ]

# UART
uart:
  id: ${device_internal_name}_uart_bus0
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

# SPI
spi:
  id: ${device_internal_name}_spi_bus0
  clk_pin: GPIO10
  mosi_pin: GPIO11
  miso_pin: GPIO12

# Sensors
sensor:
  # Internal Temperature Sensor
  - platform: internal_temperature
    id: ${device_internal_name}_internal_temperature
    name: Ambient Temperature
    update_interval: ${device_sampling_time}

