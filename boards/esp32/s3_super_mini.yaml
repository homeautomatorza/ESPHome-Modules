################################################################################
# Espressif ESP32 S3 Super Mini v1
################################################################################
# Author: Pascal Parent
# Web: https://www.youtube.com/@homeautomatorza
# Version: 1.0.0
# Licence: CC0 1.0 https://creativecommons.org/publicdomain/zero/1.0/
# ------------------------------------------------------------------------------
# WARNING:
# This code carries a "It works on my setup" disclaimer!
# Meaning that it works on my setup but it may not work on yours.
# Use at your own risk.
# ------------------------------------------------------------------------------
# Specifications:
#     - ESP32-S3 (QFN56) revision v0.2
#     - Dual-core Xtensa® LX7, 240MHz max CPU frequency
#     - 2.4 GHz Wi­Fi 6 (802.11 b/g/n)
#     - Bluetooth (LE) 5 module
#     - 512 KB SRAM
#     - 2 MB embedded PSRAM (AP Memory 3.3 V)
#     - 384 KB ROM
#     - 4 MB embedded Flash (XMC)
#     - 1 × I2C
#     - 1 x SPI
#     - 2 x UART
#     - 4 × 12-bit SAR ADC
#     - 1 x LED
#     - 1 x RGB LED
#     - 1 x Internal Temperature Sensor
# ------------------------------------------------------------------------------
# References:
#     - https://www.espboards.dev/esp32/esp32-s3-super-mini/
#     - https://esphome.io/components/esp32.html
#     - https://esphome.io/components/light/index.html
#     - https://esphome.io/components/light/esp32_rmt_led_strip.html
#     - https://esphome.io/components/i2c.html
#     - https://esphome.io/components/uart.html
#     - https://esphome.io/components/spi.html
#     - https://esphome.io/components/sensor/index.html
#     - https://esphome.io/components/sensor/internal_temperature.html
#     - https://esphome.io/components/sensor/template.html
# ------------------------------------------------------------------------------
# Usage:
#   Add the following code to package section in the device file
#
# packages:
#   board: !include boards/esp32/s3_super_mini.yaml
# ------------------------------------------------------------------------------
# This package exposes:
#   - ESP32 board/platform configuration
#   - light entities
#   - I2C bus configuration
#   - UART bus configuration
#   - SPI bus configuration
#   - sensor entities
# ------------------------------------------------------------------------------
# Notes:
#     - Compiled OK.
#     - Physical boot tested OK.
#     - WiFi captive portal visible.
#     - Network join not yet tested.
#     - See the ESPBoards reference for all pin definitions.
#     - Bug on RGB LED.
#     - GPIO 8 = PWM output.
#     - GPIO 9 = ADC input.
#     - GPIO 10 = DAC output.
#     - UART bus0 uses GPIO 35 TX and GPIO 48 RX.
#     - The balance of the pins are at the bottom and are pogo type.
#     - Includes a battery charging port.
################################################################################
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 4MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESPTOOLPY_FLASHSIZE_4MB: y # Ensures a 4MB flash size
      CONFIG_OPENTHREAD_ENABLED: n      # Disable Thread!
      CONFIG_ENABLE_WIFI_STATION: y     # Ensures the WiFi is up
      CONFIG_USE_MINIMAL_MDNS: y

# Internal RGB LED
light:
  - platform: esp32_rmt_led_strip
    id: ${device_internal_name}_onboard_rgb_led
    name: Onboard RGB LED
    icon: mdi:led-outline
    rgb_order: GRB
    pin: GPIO8
    num_leds: 1
    restore_mode: ALWAYS_OFF
    chipset: ws2812
    entity_category: config
    disabled_by_default: true

# I2C settings
i2c:
  id: ${device_internal_name}_i2c
  sda: GPIO9
  scl: GPIO10
  scan: true

# UART
uart:
  id: ${device_internal_name}_uart_bus0
  tx_pin: GPIO35
  rx_pin: GPIO48
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

# SPI
spi:
  id: ${device_internal_name}_spi_bus0
  clk_pin: GPIO7
  mosi_pin: GPIO5
  miso_pin: GPIO6
  interface: hardware

# Sensors
sensor:
  # Internal Temperature Sensor
  - platform: internal_temperature
    id: ${device_internal_name}_internal_temperature
    name: "Internal Temperature"
    icon: mdi:temperature-celsius
    update_interval: ${device_sampling_time}
    disabled_by_default: true

  - platform: template
    id: ${device_internal_name}_internal_temperature_f
    name: Internal Temperature Temperature (F)
    icon: mdi:temperature-fahrenheit
    unit_of_measurement: °F
    lambda: return id(${device_internal_name}_internal_temperature).state * 9/5+32;
    device_class: temperature
    entity_category: diagnostic
    update_interval: ${device_sampling_time}
    disabled_by_default: true
